<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수능 영어 단어장 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --surface2: #F2F0EB;
  --border: #E0DDD6;
  --border2: #C8C4BC;
  --text: #1A1916;
  --text2: #6B6760;
  --text3: #9E9B95;
  --accent: #2D5A3D;
  --accent-light: #EAF2EC;
  --accent2: #1B3A6B;
  --accent2-light: #E8EEF7;
  --gemini: #1A73E8;
  --gemini-light: #E8F0FE;
  --danger: #B91C1C;
  --danger-light: #FEF2F2;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-size: 14px; line-height: 1.6; }
.layout { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

/* 사이드바 */
.sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; height: 100vh; }
.sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 9px; margin-bottom: 3px; }
.logo-icon { width: 32px; height: 32px; background: var(--text); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; flex-shrink: 0; }
.logo h1 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; }
.logo-sub { font-size: 11px; color: var(--text3); margin-left: 41px; }
.sidebar-body { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
.sec-label { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }

/* AI 엔진 표시 */
.engine-badge { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--gemini-light); border: 1px solid #AECBFA; border-radius: var(--radius); }
.engine-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gemini); flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
.engine-name { font-size: 13px; font-weight: 500; color: var(--gemini); }
.engine-free { font-size: 10px; color: #1B66C9; background: white; border: 1px solid #AECBFA; border-radius: 20px; padding: 1px 7px; margin-left: auto; }

/* 설정 */
select { width: 100%; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); appearance: none; -webkit-appearance: none; cursor: pointer; }
select:focus { outline: none; border-color: var(--gemini); }
.select-wrap { position: relative; }
.select-wrap::after { content: '▾'; position: absolute; right: 9px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--text3); pointer-events: none; }

/* 제외 단어 */
.tag-input-row { display: flex; gap: 5px; }
.tag-input-row input { flex: 1; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); min-width: 0; }
.tag-input-row input:focus { outline: none; border-color: var(--gemini); }
.btn-add { padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; cursor: pointer; color: var(--text2); font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
.btn-add:hover { background: var(--border); }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
.tag { display: inline-flex; align-items: center; gap: 2px; padding: 2px 7px 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
.tag-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 12px; padding: 0; line-height: 1; }

/* 실행 버튼 */
.btn-run { width: 100%; padding: 12px; background: var(--gemini); color: white; border: none; border-radius: var(--radius); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.2s; margin-top: auto; }
.btn-run:hover:not(:disabled) { background: #1557B0; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
.btn-run:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

.error-bar { padding: 9px 12px; background: var(--danger-light); border: 1px solid #FECACA; border-radius: var(--radius); color: var(--danger); font-size: 12px; display: none; }
.error-bar.show { display: block; }

/* 메인 */
.main { display: grid; grid-template-rows: auto 1fr; height: 100vh; overflow: hidden; }

/* 입력 탭 */
.input-area { background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.input-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; }
.input-tab { padding: 13px 18px; border: none; background: none; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.input-tab:hover { color: var(--text2); }
.input-tab.active { color: var(--text); font-weight: 500; border-bottom-color: var(--gemini); }
.input-panel { display: none; padding: 16px 20px; }
.input-panel.show { display: flex; flex-direction: column; gap: 8px; }
.paste-area { width: 100%; height: 170px; padding: 13px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); resize: none; line-height: 1.8; transition: border-color 0.15s; }
.paste-area:focus { outline: none; border-color: var(--gemini); background: var(--surface); }
.paste-area::placeholder { color: var(--text3); font-size: 12px; }
.paste-footer { display: flex; align-items: center; justify-content: space-between; }
.char-count { font-size: 11px; color: var(--text3); }
.btn-clear { background: none; border: none; font-size: 11px; color: var(--text3); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
.btn-clear:hover { color: var(--danger); }
.upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); display: flex; align-items: center; justify-content: center; gap: 14px; }
.upload-zone:hover, .upload-zone.drag { border-color: var(--gemini); background: var(--gemini-light); }
.upload-icon { font-size: 28px; }
.upload-right p { font-size: 13px; color: var(--text2); font-weight: 500; margin-bottom: 2px; }
.upload-right span { font-size: 11px; color: var(--text3); }
.file-chip { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--accent-light); border: 1px solid #B8D9C0; border-radius: var(--radius); margin-top: 8px; }
.file-chip-name { font-size: 12px; color: var(--accent); flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-chip-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; }
.img-thumb { width: 100%; max-height: 80px; object-fit: cover; border-radius: 7px; margin-top: 8px; display: none; border: 1px solid var(--border); }

/* 결과 */
.result-area { overflow-y: auto; padding: 20px; background: var(--bg); display: flex; flex-direction: column; gap: 16px; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--text3); padding: 40px; }
.empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.3; }
.empty-state h2 { font-size: 16px; color: var(--text2); font-weight: 500; margin-bottom: 6px; }
.empty-state p { font-size: 12px; line-height: 1.9; }
.progress-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; text-align: center; display: none; box-shadow: var(--shadow); }
.progress-card.show { display: block; }
.spinner { width: 32px; height: 32px; border: 2.5px solid var(--border); border-top-color: var(--gemini); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress-text { font-size: 13px; color: var(--text2); }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); display: none; }
.result-card.show { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.result-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.result-title { font-size: 14px; font-weight: 500; }
.stat-chips { display: flex; gap: 6px; }
.stat-chip { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.chip-word { background: var(--accent2-light); color: var(--accent2); }
.chip-idiom { background: var(--accent-light); color: var(--accent); }
.chip-total { background: var(--surface2); color: var(--text2); }
.tabs-row { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 4px; }
.tab { padding: 5px 13px; border-radius: 20px; border: 1px solid transparent; background: none; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; }
.tab:hover { background: var(--surface2); }
.tab.active { background: var(--text); color: white; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
thead th { padding: 9px 20px; text-align: left; background: var(--surface2); color: var(--text3); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
tbody td { padding: 10px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--surface2); }
.word-en { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.type-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 500; margin-left: 5px; vertical-align: middle; }
.badge-word { background: var(--accent2-light); color: var(--accent2); }
.badge-idiom { background: var(--accent-light); color: var(--accent); }
.word-ko { color: var(--text2); }
.dl-bar { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface2); display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.dl-bar span { font-size: 11px; color: var(--text3); }
.btn-dl { padding: 7px 14px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
.btn-dl:hover { background: var(--text); color: white; border-color: var(--text); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
@media (max-width: 860px) { .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } .sidebar { height: auto; } .main { height: auto; } body { overflow: auto; height: auto; } }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">📖</div>
        <h1>VocabExtract</h1>
      </div>
      <div class="logo-sub">수능 영어 단어장 자동 생성기</div>
    </div>
    <div class="sidebar-body">

      <div>
        <div class="sec-label">AI 엔진</div>
        <div class="engine-badge">
          <div class="engine-dot"></div>
          <span class="engine-name">Gemini 2.5 Flash</span>
          <span class="engine-free">무료</span>
        </div>
      </div>

      <div>
        <div class="sec-label">분석 설정</div>
        <div style="display:flex;flex-direction:column;gap:7px;">
          <div class="select-wrap">
            <select id="levelFilter">
              <option value="suneung">수능 빈출 단어 위주</option>
              <option value="all">지문 속 모든 중요 단어</option>
              <option value="both">둘 다 포함</option>
            </select>
          </div>
          <div class="select-wrap">
            <select id="outputFormat">
              <option value="simple">영단어 | 한글뜻</option>
              <option value="pos">영단어 | 품사 | 한글뜻</option>
            </select>
          </div>
        </div>
      </div>

      <div>
        <div class="sec-label">제외 단어</div>
        <div class="tag-input-row">
          <input type="text" id="excludeInput" placeholder="제외할 단어 입력" onkeydown="if(event.key==='Enter')addTag()">
          <button class="btn-add" onclick="addTag()">+ 추가</button>
        </div>
        <div class="tags-wrap" id="tagsWrap">
          <span class="tag">the <button class="tag-del" onclick="removeTag(this)">×</button></span>
          <span class="tag">a <button class="tag-del" onclick="removeTag(this)">×</button></span>
          <span class="tag">an <button class="tag-del" onclick="removeTag(this)">×</button></span>
          <span class="tag">this <button class="tag-del" onclick="removeTag(this)">×</button></span>
          <span class="tag">that <button class="tag-del" onclick="removeTag(this)">×</button></span>
          <span class="tag">is <button class="tag-del" onclick="removeTag(this)">×</button></span>
          <span class="tag">are <button class="tag-del" onclick="removeTag(this)">×</button></span>
        </div>
      </div>

      <div class="error-bar" id="errorBar"></div>

      <button class="btn-run" id="btnRun" onclick="runAnalysis()" disabled>
        ✦ AI 분석 시작
      </button>

    </div>
  </aside>

  <main class="main">
    <div class="input-area">
      <div class="input-tabs">
        <button class="input-tab active" id="tabText" onclick="setMode('text')">✏️ 텍스트 붙여넣기</button>
        <button class="input-tab" id="tabFile" onclick="setMode('file')">📎 파일 업로드</button>
      </div>
      <div class="input-panel show" id="panelText">
        <textarea class="paste-area" id="pasteArea"
          placeholder="여기에 영어 지문을 Ctrl+V 로 붙여넣기 하세요.&#10;&#10;예시) The phenomenon of cognitive dissonance occurs when a person simultaneously holds contradictory beliefs. This psychological concept was first introduced by Leon Festinger..."
          oninput="onTextChange()"></textarea>
        <div class="paste-footer">
          <span class="char-count" id="charCount">0자 입력됨</span>
          <button class="btn-clear" onclick="clearText()">지우기</button>
        </div>
      </div>
      <div class="input-panel" id="panelFile">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon">📂</div>
          <div class="upload-right">
            <p>클릭하거나 파일을 드래그하세요</p>
            <span>JPG · PNG · PDF 지원</span>
          </div>
        </div>
        <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.pdf" style="display:none">
        <div id="fileChip" style="display:none">
          <div class="file-chip">
            <span id="fileChipIcon">📄</span>
            <span class="file-chip-name" id="fileChipName"></span>
            <button class="file-chip-del" onclick="clearFile()">✕</button>
          </div>
          <img id="imgThumb" class="img-thumb" alt="미리보기">
        </div>
      </div>
    </div>

    <div class="result-area" id="resultArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📝</div>
        <h2>결과가 여기에 표시됩니다</h2>
        <p>위 입력창에 영어 지문을 붙여넣고<br>왼쪽 설정 확인 후<br><strong>AI 분석 시작</strong> 버튼을 누르세요</p>
      </div>
      <div class="progress-card" id="progressCard">
        <div class="spinner"></div>
        <div class="progress-text" id="progressText">Gemini AI가 분석 중입니다...</div>
      </div>
      <div class="result-card" id="resultCard">
        <div class="result-header">
          <div class="result-title">추출 결과</div>
          <div class="stat-chips">
            <span class="stat-chip chip-word" id="chipWord">단어 0</span>
            <span class="stat-chip chip-idiom" id="chipIdiom">숙어 0</span>
            <span class="stat-chip chip-total" id="chipTotal">전체 0</span>
          </div>
        </div>
        <div class="tabs-row">
          <button class="tab active" onclick="switchTab('all',this)">전체</button>
          <button class="tab" onclick="switchTab('word',this)">단어만</button>
          <button class="tab" onclick="switchTab('idiom',this)">숙어만</button>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th style="width:46%">영어</th><th style="width:54%">한글뜻</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="dl-bar">
          <span>다운로드</span>
          <button class="btn-dl" onclick="downloadDOCX()">📝 DOCX (한글/Word)</button>
          <button class="btn-dl" onclick="downloadPDF()">📄 PDF</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ★★★ 여기에 Gemini API 키를 입력하세요 ★★★
var GEMINI_API_KEY = "AIzaSyCY2EHM_3P408Pny2qDDGOdBSHNBklm_Sc';
// ★★★★★★★★★★★★★★★★★★★★★★★★★★★★

var inputMode = 'text';
var fileData = null;
var fileType = null;
var allItems = [];
var currentTab = 'all';

function setMode(mode) {
  inputMode = mode;
  document.getElementById('tabText').className = 'input-tab' + (mode==='text' ? ' active' : '');
  document.getElementById('tabFile').className = 'input-tab' + (mode==='file' ? ' active' : '');
  document.getElementById('panelText').className = 'input-panel' + (mode==='text' ? ' show' : '');
  document.getElementById('panelFile').className = 'input-panel' + (mode==='file' ? ' show' : '');
  checkReady();
}

function onTextChange() {
  var v = document.getElementById('pasteArea').value;
  document.getElementById('charCount').textContent = v.length.toLocaleString() + '자 입력됨';
  checkReady();
}

function clearText() {
  document.getElementById('pasteArea').value = '';
  document.getElementById('charCount').textContent = '0자 입력됨';
  checkReady();
}

var uploadZone = document.getElementById('uploadZone');
var fileInput = document.getElementById('fileInput');
uploadZone.addEventListener('dragover', function(e){ e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', function(){ uploadZone.classList.remove('drag'); });
uploadZone.addEventListener('drop', function(e){ e.preventDefault(); uploadZone.classList.remove('drag'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', function(e){ if(e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  var ok = ['image/jpeg','image/png','image/jpg','application/pdf'];
  if (ok.indexOf(file.type) === -1) { showError('JPG, PNG, PDF 파일만 지원됩니다.'); return; }
  hideError();
  var r = new FileReader();
  r.onload = function(e) {
    fileData = e.target.result.split(',')[1];
    fileType = file.type;
    document.getElementById('fileChipIcon').textContent = file.type==='application/pdf' ? '📑' : '🖼️';
    document.getElementById('fileChipName').textContent = file.name;
    document.getElementById('fileChip').style.display = 'block';
    var t = document.getElementById('imgThumb');
    if (file.type !== 'application/pdf') { t.src = e.target.result; t.style.display = 'block'; } else { t.style.display = 'none'; }
    checkReady();
  };
  r.readAsDataURL(file);
}

function clearFile() {
  fileData = null; fileType = null;
  document.getElementById('fileChip').style.display = 'none';
  document.getElementById('imgThumb').style.display = 'none';
  fileInput.value = '';
  checkReady();
}

function checkReady() {
  var ok = inputMode === 'text' ? document.getElementById('pasteArea').value.trim().length > 5 : fileData !== null;
  document.getElementById('btnRun').disabled = !ok;
}

function addTag() {
  var inp = document.getElementById('excludeInput');
  var val = inp.value.trim().toLowerCase();
  if (!val) return;
  var wrap = document.getElementById('tagsWrap');
  var existing = [];
  wrap.querySelectorAll('.tag').forEach(function(t){ existing.push(t.firstChild.textContent.trim()); });
  if (existing.indexOf(val) !== -1) { inp.value = ''; return; }
  var tag = document.createElement('span');
  tag.className = 'tag';
  tag.innerHTML = val + ' <button class="tag-del" onclick="removeTag(this)">×</button>';
  wrap.appendChild(tag);
  inp.value = '';
}
function removeTag(btn) { btn.parentElement.remove(); }
function getExcludeWords() {
  var words = [];
  document.getElementById('tagsWrap').querySelectorAll('.tag').forEach(function(t){ words.push(t.firstChild.textContent.trim().toLowerCase()); });
  return words;
}
function showError(msg) { var b = document.getElementById('errorBar'); b.textContent = '⚠ '+msg; b.classList.add('show'); }
function hideError() { document.getElementById('errorBar').classList.remove('show'); }

function runAnalysis() {
  if (!GEMINI_API_KEY || GEMINI_API_KEY === 'YOUR_GEMINI_API_KEY_HERE') {
    showError('API 키가 설정되지 않았습니다. index.html 파일에서 키를 입력해주세요.');
    return;
  }
  hideError();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('progressCard').classList.add('show');
  document.getElementById('btnRun').disabled = true;

  var level = document.getElementById('levelFilter').value;
  var ex = getExcludeWords();
  var ldesc = {suneung:'수능 빈출 어휘 위주로', all:'지문 속 모든 중요 단어를', both:'수능 빈출과 모든 중요 단어를 모두'}[level];

  var prompt = '수능 영어 전문가로서 아래 영어 텍스트를 분석해 '+ldesc+' 추출하세요.\n\n'
    +'반드시 제외: '+ex.join(', ')+', I, am, is, are, was, were, be, been, he, she, it, we, they, you, my, your, his, her, our, their, a, an, the, this, that, and, or, but, in, on, at, to, for, of, do, did, can, will, would, have, has, go, get, very, also, just, not, so, if, as, with, from, by, up, out\n\n'
    +'규칙:\n1. 제외 단어 절대 포함 금지\n2. 단어(word)와 숙어(idiom) 모두 추출\n3. 중복 제거\n4. JSON만 출력(마크다운 없이):\n{"items":[{"en":"단어","ko":"한글뜻","type":"word 또는 idiom","pos":"n/v/adj/adv"}]}';

  var parts;
  if (inputMode === 'text') {
    parts = [{ text: prompt + '\n\n[분석할 텍스트]\n' + document.getElementById('pasteArea').value.trim() }];
  } else {
    parts = [{ text: prompt }, { inline_data: { mime_type: fileType==='application/pdf'?'application/pdf':(fileType==='image/png'?'image/png':'image/jpeg'), data: fileData } }];
  }

  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GEMINI_API_KEY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: parts }] })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (d.error) throw new Error('Gemini 오류: ' + d.error.message);
    var txt = d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts && d.candidates[0].content.parts[0] ? d.candidates[0].content.parts[0].text : '';
    var clean = txt.replace(/```json|```/g,'').trim();
    var parsed;
    try { parsed = JSON.parse(clean); } catch(e) { throw new Error('응답 파싱 오류. 다시 시도해주세요.'); }
    allItems = parsed.items || [];
    renderTable(allItems);
    document.getElementById('progressCard').classList.remove('show');
    document.getElementById('resultCard').classList.add('show');
    document.getElementById('resultArea').scrollTop = 0;
  })
  .catch(function(e){ document.getElementById('progressCard').classList.remove('show'); document.getElementById('emptyState').style.display = 'flex'; showError(e.message); })
  .finally(function(){ document.getElementById('btnRun').disabled = false; checkReady(); });
}

function renderTable(items) {
  var words = items.filter(function(i){ return i.type==='word'; });
  var idioms = items.filter(function(i){ return i.type==='idiom'; });
  document.getElementById('chipWord').textContent = '단어 ' + words.length;
  document.getElementById('chipIdiom').textContent = '숙어 ' + idioms.length;
  document.getElementById('chipTotal').textContent = '전체 ' + items.length;
  var filtered = currentTab==='word' ? words : currentTab==='idiom' ? idioms : items;
  var showPos = document.getElementById('outputFormat').value === 'pos';
  var body = document.getElementById('tableBody');
  body.innerHTML = '';
  filtered.forEach(function(item){
    var tr = document.createElement('tr');
    var pos = showPos && item.pos ? '<span style="font-size:10px;color:#9E9B95;margin-left:3px;">['+item.pos+']</span>' : '';
    var badge = item.type==='idiom' ? '<span class="type-badge badge-idiom">숙어</span>' : '<span class="type-badge badge-word">단어</span>';
    tr.innerHTML = '<td><span class="word-en">'+item.en+'</span>'+badge+pos+'</td><td class="word-ko">'+item.ko+'</td>';
    body.appendChild(tr);
  });
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  renderTable(allItems);
}

function getFiltered() {
  return currentTab==='word' ? allItems.filter(function(i){ return i.type==='word'; })
       : currentTab==='idiom' ? allItems.filter(function(i){ return i.type==='idiom'; })
       : allItems;
}

function downloadDOCX() {
  if (!allItems.length) return;
  var items = getFiltered();
  var words = items.filter(function(i){ return i.type==='word'; });
  var idioms = items.filter(function(i){ return i.type==='idiom'; });
  var date = new Date().toLocaleDateString('ko-KR');
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function makeTable(rows) {
    var xml = '<w:tbl><w:tblPr><w:tblW w:w="9000" w:type="dxa"/><w:tblBorders><w:top w:val="single" w:sz="4" w:color="DDDDDD"/><w:left w:val="single" w:sz="4" w:color="DDDDDD"/><w:bottom w:val="single" w:sz="4" w:color="DDDDDD"/><w:right w:val="single" w:sz="4" w:color="DDDDDD"/><w:insideH w:val="single" w:sz="4" w:color="DDDDDD"/><w:insideV w:val="single" w:sz="4" w:color="DDDDDD"/></w:tblBorders></w:tblPr>';
    xml += '<w:tr><w:tc><w:tcPr><w:tcW w:w="4200" w:type="dxa"/><w:shd w:val="clear" w:fill="F2F0EB"/></w:tcPr><w:p><w:r><w:rPr><w:b/></w:rPr><w:t>영단어</w:t></w:r></w:p></w:tc><w:tc><w:tcPr><w:tcW w:w="4800" w:type="dxa"/><w:shd w:val="clear" w:fill="F2F0EB"/></w:tcPr><w:p><w:r><w:rPr><w:b/></w:rPr><w:t>한글뜻</w:t></w:r></w:p></w:tc></w:tr>';
    rows.forEach(function(item, idx){
      var fill = idx%2===0 ? 'FFFFFF' : 'F9F8F6';
      xml += '<w:tr><w:tc><w:tcPr><w:tcW w:w="4200" w:type="dxa"/><w:shd w:val="clear" w:fill="'+fill+'"/></w:tcPr><w:p><w:r><w:rPr><w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr><w:t>'+esc(item.en)+'</w:t></w:r></w:p></w:tc><w:tc><w:tcPr><w:tcW w:w="4800" w:type="dxa"/><w:shd w:val="clear" w:fill="'+fill+'"/></w:tcPr><w:p><w:r><w:t>'+esc(item.ko)+'</w:t></w:r></w:p></w:tc></w:tr>';
    });
    return xml + '</w:tbl>';
  }
  function h(txt, sz, col){ return '<w:p><w:pPr><w:spacing w:before="200" w:after="100"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="'+(sz||26)+'"/><w:color w:val="'+(col||'1A1916')+'"/></w:rPr><w:t>'+esc(txt)+'</w:t></w:r></w:p>'; }
  function sub(txt){ return '<w:p><w:pPr><w:spacing w:after="80"/></w:pPr><w:r><w:rPr><w:sz w:val="20"/><w:color w:val="888888"/></w:rPr><w:t>'+esc(txt)+'</w:t></w:r></w:p>'; }
  var body = h('수능 영어 단어장',34,'1A1916')+sub('생성일: '+date+' · 총 '+items.length+'개 항목')+'<w:p><w:pPr><w:spacing w:after="160"/></w:pPr></w:p>';
  if (words.length) body += h('단어 ('+words.length+'개)',24,'1B3A6B')+makeTable(words)+'<w:p><w:pPr><w:spacing w:after="200"/></w:pPr></w:p>';
  if (idioms.length) body += h('숙어 ('+idioms.length+'개)',24,'2D5A3D')+makeTable(idioms);
  var docXml='<?xml version="1.0" encoding="UTF-8"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body><w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1080" w:right="900" w:bottom="1080" w:left="1080"/></w:sectPr>'+body+'</w:body></w:document>';
  var rels='<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>';
  var wRels='<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>';
  var ct='<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>';
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
  s.onload=function(){
    var zip=new JSZip();
    zip.file('[Content_Types].xml',ct);
    zip.file('_rels/.rels',rels);
    zip.file('word/document.xml',docXml);
    zip.file('word/_rels/document.xml.rels',wRels);
    zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'})
      .then(function(blob){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='수능영어단어장.docx'; a.click(); });
  };
  document.head.appendChild(s);
}

function downloadPDF() {
  if (!allItems.length) return;
  var items = getFiltered();
  var words = items.filter(function(i){ return i.type==='word'; });
  var idioms = items.filter(function(i){ return i.type==='idiom'; });
  var date = new Date().toLocaleDateString('ko-KR');
  var s1=document.createElement('script');
  s1.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
    s2.onload=function(){
      var doc=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      doc.setFontSize(20); doc.setTextColor(26,25,22); doc.text('수능 영어 단어장',20,22);
      doc.setFontSize(10); doc.setTextColor(136,136,136); doc.text('생성일: '+date+' · 총 '+items.length+'개 항목',20,30);
      var y=38;
      function addSection(title,color,rows){
        if(!rows.length) return;
        doc.setFontSize(13); doc.setTextColor(color[0],color[1],color[2]); doc.text(title,20,y); y+=5;
        doc.autoTable({startY:y, head:[['영단어','한글뜻']], body:rows.map(function(w){return[w.en,w.ko];}),
          styles:{fontSize:10,cellPadding:3}, headStyles:{fillColor:[242,240,235],textColor:[80,80,80],fontStyle:'bold'},
          alternateRowStyles:{fillColor:[249,249,247]},
          columnStyles:{0:{cellWidth:80,fontStyle:'bold',textColor:[27,58,107]},1:{cellWidth:95}},
          margin:{left:20,right:20}});
        y=doc.lastAutoTable.finalY+10;
      }
      addSection('단어 ('+words.length+'개)',[27,58,107],words);
      addSection('숙어 ('+idioms.length+'개)',[45,90,61],idioms);
      doc.save('수능영어단어장.pdf');
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}
</script>
</body>
</html>
